<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дом у моря - Список домов</title>
</head>
<body>
    <h1>Список домов</h1>

    {% for house in houses %}
        <div style="border: 1px solid #ccc; margin: 10px 0; padding: 15px; border-radius: 8px;">
            <h2>{{ house.name }}</h2>
            <p><strong>Цена:</strong> {{ house.price }} </p>
            <p>{{ house.description }}</p>
        </div>
    {% empty %}
        <p>Пока нет добавленных домов.</p>
    {% endfor %}

</body>
</html>
